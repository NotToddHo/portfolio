<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | Todd Ho Nguyen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-muted: #555555;
            --accent: #8a2be2;
            --nav-bg: #f5f5f5;
            --card-bg: #f9f9f9;
            --border: #e0e0e0;
            --banner-bg: #5a189a;
            --timeline-line: #8a2be2;
        }
        
        [data-theme="dark"] {
            --bg: #1a1a1a;
            --text: #ffffff;
            --text-muted: #bcbcbc;
            --accent: #8a2be2;
            --nav-bg: #121212;
            --card-bg: #232323;
            --border: #2e2e2e;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: var(--nav-bg);
            padding: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            border-bottom: 1px solid var(--border);
            transition: background-color 0.3s, border-color 0.3s;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding-left: 3rem;
            text-decoration: none;
            transition: transform 0.2s ease;
        }
        .logo-container:hover {
            transform: scale(1.03);
        }
        .logo-container:hover .logo {
            color: var(--accent);
        }
        .logo-container:hover .logo-icon {
            fill: var(--accent);
        }
        
        .logo-icon {
            width: 24px;
            height: 24px;
            fill: var(--text);
            transition: fill 0.3s ease;
        }
        
        .logo { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 800; 
            letter-spacing: 0.2em; 
            text-transform: uppercase; 
            color: var(--text);
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }
        
        .nav-links { display: flex; height: 100%; align-items: center; }
        .nav-links a { 
            color: #7f7f7f; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 0.85rem; 
            letter-spacing: 0.05em;
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            transition: all 0.2s; 
        }
        .nav-links a:hover { color: var(--text); }
        .nav-links a.active { 
            background-color: var(--accent); 
            color: #ffffff !important;
            font-weight: 600;
        }

        #theme-toggle {
            background: transparent;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 0 2.5rem;
            font-size: 1.2rem;
            height: 100%;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 120px 2rem 4rem 2rem; }
        
        .section-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .scroll-indicator {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 5rem;
            font-weight: 500;
        }
        
        .arrow-down { 
            margin-top: 0.5rem; 
            display: inline-block; 
            font-size: 1.2rem; 
            color: var(--text-muted); 
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
            60% { transform: translateY(4px); }
        }

        section { padding: 4rem 0; border-top: 1px solid var(--border); }

        .timeline-wrapper { position: relative; max-width: 900px; margin: 0 auto; padding: 2rem 0; }
        .timeline-wrapper::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 8px;
            background: var(--timeline-line);
            transform: translateX(-50%);
            border-radius: 4px;
        }
        .timeline-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4rem; position: relative; }
        .timeline-row:nth-child(even) { flex-direction: row-reverse; }
        .timeline-panel { width: 45%; background-color: var(--card-bg); border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; }
        .timeline-graphic { width: 45%; display: flex; justify-content: center; align-items: center; }
        .timeline-graphic div { font-size: 4rem; background: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); }
        
        .timeline-panel h3 { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; margin-bottom: 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .timeline-panel p { color: var(--text-muted); font-size: 0.9rem; font-weight: 300; margin-bottom: 1rem; }
