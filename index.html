<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- This fixes your browser tab name -->
    <title>Home</title>
    <style>
        /* This keeps your clean black background and styling */
        body {
            margin: 0;
            background-color: #111;
            color: white;
            font-family: sans-serif;
        }
        .nav-container {
            display: flex;
            justify-content: flex-end;
            background-color: #000;
            padding: 10px 20px;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .nav-links a {
            color: #888;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 15px;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: white;
        }
        /* This keeps your purple highlight on your active page */
        .nav-links a.active {
            color: white;
            background-color: #8a2be2; 
            border-radius: 4px;
        }
        .content {
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Your clean Navigation Bar -->
    <div class="nav-container">
        <div class="nav-links">
            <!-- Changing "index.html" to "/" keeps your URL clean as toddho.com -->
            <a href="/" class="active">Work</a>
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact</a>
        </div>
    </div>

    <!-- Your main website content goes here -->
    <div class="content">
        <h1>Welcome to My Site</h1>
    </div>

</body>
</html>
