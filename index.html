<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        /* Modern reset to match your original clean dark look */
        body {
            margin: 0;
            padding: 0;
            background-color: #111111;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
        }

        /* Navigation bar layout */
        .nav-container {
            width: 100%;
            background-color: #000000;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            box-sizing: border-box;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        /* Navigation link styles */
        .nav-links a {
            color: #aaaaaa;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 16px 24px;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: #ffffff;
        }

        /* Matches the purple background block for the active page from your screenshot */
        .nav-links a.active {
            color: #ffffff;
            background-color: #8A2BE2; 
        }

        /* Main content container */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 24px;
            text-align: center;
        }

        .main-content h1 {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

    <nav class="nav-container">
        <div class="nav-links">
            <!-- These forward slashes keep your URL completely clean -->
            <a href="/" class="active">Work</a>
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact</a>
        </div>
    </nav>

    <main class="main-content">
        <!-- REPLACE THIS LINE WITH YOUR PROJECTS / IMAGE CODES -->
        <h1>Welcome to My Site</h1>
    </main>

</body>
</html>
