<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todd Ho Nguyen | Systems & UX Product Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-muted: #555555;
            --accent: #8a2be2;
            --nav-bg: #f5f5f5;
            --card-bg: #f9f9f9;
            --border: #e0e0e0;
            --banner-bg: #5a189a;
        }
        
        [data-theme="dark"] {
            --bg: #1a1a1a;
            --text: #ffffff;
            --text-muted: #bcbcbc;
            --accent: #8a2be2;
            --nav-bg: #121212;
            --card-bg: #232323;
            --border: #2e2e2e;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: var(--nav-bg);
            padding: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            border-bottom: 1px solid var(--border);
            transition: background-color 0.3s, border-color 0.3s;
        }
        .logo { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 800; 
            letter-spacing: 0.2em; 
            text-transform: uppercase; 
            color: var(--text);
            padding-left: 3rem;
            font-size: 1.1rem;
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-links { display: flex; height: 100%; align-items: center; }
        .nav-links a { 
            color: #7f7f7f; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 0.85rem; 
            letter-spacing: 0.05em;
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            transition: all 0.2s; 
        }
        .nav-links a:hover { color: var(--text); }
        .nav-links a.active { 
            background-color: var(--accent); 
            color: #ffffff !important;
            font-weight: 600;
        }

        #theme-toggle {
            background: transparent;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 0 2.5rem;
            font-size: 1.2rem;
            height: 100%;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }
        
        .hero { 
            padding-top: 160px;
            padding-bottom: 80px;
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            gap: 4rem;
        }
        .hero-left { width: 55%; }
        .hero-right { width: 45%; display: flex; justify-content: center; }
        
        h1 { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 2.6rem; 
            font-weight: 800; 
            margin-bottom: 1.5rem; 
            line-height: 1.3;
        }
        .hero-desc { 
            font-size: 1rem; 
            color: var(--text-muted); 
            margin-bottom: 2.5rem; 
            font-weight: 300;
        }
        .btn-group { display: flex; gap: 1.5rem; }
        
        .btn { 
            background-color: var(--text); 
            color: var(--bg); 
            padding: 0.8rem 2rem; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 0.9rem;
            text-decoration: none; 
            border: 1px solid var(--border); 
            transition: all 0.2s; 
        }
        .btn:hover { opacity: 0.9; }
        .btn-secondary { background-color: transparent; border: none; color: var(--text); display: flex; align-items: center; gap: 0.5rem; }
        .btn-secondary:hover { color: var(--accent); }

        .scroll-indicator {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 6rem;
            font-weight: 500;
        }
        .arrow-down {
            margin-top: 0.5rem;
            display: inline-block;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        #work { padding: 6rem 0; }
        .section-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* Premium Card Layout Architecture with Custom Hover Logic */
        .project-card { 
            display: flex; 
            gap: 4rem; 
            margin-bottom: 5rem; 
            align-items: center; 
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.4s ease, border-color 0.4s ease, transform 0.3s ease;
        }

        .project-card:hover {
            background-color: #121212 !important; 
            border-color: #333333 !important;
            transform: translateY(-2px); 
        }

        .project-card:hover .project-title,
        .project-card:hover .project-desc,
        .project-card:hover .view-link {
            color: #ffffff !important;
            border-color: #ffffff !important;
        }

        .project-card:hover .tag {
            color: var(--accent) !important;
        }
        
        .project-img-block { 
            width: 50%; 
            background: #232323; 
            border-radius: 12px; 
            aspect-ratio: 16/11; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #2e2e2e;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .project-info { width: 50%; }
        
        .tag { 
            color: var(--accent); 
            font-size: 0.9rem; 
            font-weight: 600; 
            margin-bottom: 0.75rem; 
            display: block; 
        }
        .project-title { 
            font-family: 'Montserrat', sans-serif;
            font-size: 1.65rem; 
            font-weight: 700; 
            margin-bottom: 0.5rem; 
            line-height: 1.3;
            transition: color 0.3s ease;
        }
        .project-desc { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem; font-weight: 400; letter-spacing: 0.02em; transition: color 0.3s ease; }
        
        .view-link { color: var(--text); text-decoration: none; font-weight: 600; font-size: 0.9rem; border-bottom: 1px solid var(--text); padding-bottom: 0.2rem; transition: all 0.2s; }
        .view-link:hover { color: var(--accent); border-color: var(--accent); }
        .coming-soon { color: #666; font-size: 0.9rem; font-weight: 500; border-bottom: 1px solid #444; padding-bottom: 0.2rem; }

        .cta-banner {
            background-color: var(--banner-bg);
            color: #ffffff;
            padding: 5rem 2rem;
            text-align: center;
            margin-top: 4rem;
        }
        .cta-banner h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 2rem;
        }
        .btn-cta {
            background-color: #000000;
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 6px;
            text-decoration: none;
        }

        .base-footer {
            background-color: #000000;
            text-align: center;
            padding: 3rem 2rem;
            font-size: 0.85rem;
            color: #bcbcbc;
        }
        .base-footer a { color: #ffffff; text-decoration: none; }
        .footer-info { margin-bottom: 1rem; line-height: 1.8; font-weight: 300; }

        @media(max-width: 768px) {
            .hero, .project-card { flex-direction: column !important; gap: 2.5rem; text-align: center; }
            .hero-left, .hero-right, .project-img-block, .project-info { width: 100%; }
            .btn-group { justify-content: center; }
            .nav-links a { padding: 0 1rem; }
            .logo { padding-left: 1rem; }
        }
    </style>
</head>

        </div>
    </nav>
