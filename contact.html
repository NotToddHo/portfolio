<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Todd Ho Nguyen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-muted: #555555;
            --accent: #8a2be2;
            --nav-bg: #f5f5f5;
            --border: #e0e0e0;
            --input-bg: #ffffff;
        }
        
        [data-theme="dark"] {
            --bg: #1a1a1a;
            --text: #ffffff;
            --text-muted: #bcbcbc;
            --accent: #8a2be2;
            --nav-bg: #121212;
            --border: #2e2e2e;
            --input-bg: transparent;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: var(--nav-bg);
            padding: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            border-bottom: 1px solid var(--border);
            transition: background-color 0.3s, border-color 0.3s;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding-left: 3rem;
            text-decoration: none;
            transition: transform 0.2s ease;
        }
        .logo-container:hover {
            transform: scale(1.03);
        }
        .logo-container:hover .logo {
            color: var(--accent);
        }
        .logo-container:hover .logo-icon {
            fill: var(--accent);
        }
        
        .logo-icon {
            width: 24px;
            height: 24px;
            fill: var(--text);
            transition: fill 0.3s ease;
        }
        
        .logo { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 800; 
            letter-spacing: 0.2em; 
            text-transform: uppercase; 
            color: var(--text);
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }
        
        .nav-links { display: flex; height: 100%; align-items: center; }
        .nav-links a { 
            color: #7f7f7f; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 0.85rem; 
            letter-spacing: 0.05em;
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            transition: all 0.2s; 
        }
        .nav-links a:hover { color: var(--text); }
        .nav-links a.active { 
            background-color: var(--accent); 
            color: #ffffff !important;
            font-weight: 600;
        }

        #theme-toggle {
            background: transparent;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 0 2.5rem;
            font-size: 1.2rem;
            height: 100%;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 160px 2rem 6rem 2rem; }
        
        .contact-grid { display: flex; gap: 5rem; align-items: flex-start; }
        .contact-left { width: 45%; }
        .contact-right { width: 55%; }

        h1 { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 3rem; 
            font-weight: 800; 
            margin-bottom: 2rem; 
        }
        
        .contact-desc { color: var(--text-muted); font-size: 1.05rem; font-weight: 300; margin-bottom: 2.5rem; max-width: 400px; }
        .info-text { font-size: 1rem; color: var(--text); margin-bottom: 0.5rem; font-weight: 400; }
        .info-text a { color: var(--text); text-decoration: none; }
        .info-text a:hover { color: var(--accent); }

        .linkedin-icon { margin-top: 1.5rem; display: inline-block; color: var(--text); text-decoration: none; font-weight: 600; font-size: 1.1rem; }
        .linkedin-icon:hover { color: var(--accent); }

        .form-group { margin-bottom: 1.5rem; }
        input, textarea { 
            width: 100%; 
            background: var(--input-bg); 
            border: 1px solid var(--border); 
            padding: 1rem; 
            color: var(--text); 
            font-family: inherit; 
            font-size: 1rem; 
            transition: border-color 0.2s, background-color 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }

        .btn-submit { 
            width: 100%;
            background-color: var(--text); 
            color: var(--bg); 
            padding: 1rem; 
            font-size: 1rem;
            font-weight: 600; 
            border: none; 
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s; 
        }

        .base-footer {
            background-color: #000000;
            text-align: center;
            padding: 4rem 2rem;
            font-size: 0.85rem;
            color: #bcbcbc;
            border-top: 1px solid #222;
        }
        .base-footer a { color: white; text-decoration: none; }
        .footer-info { margin-bottom: 1.5rem; line-height: 2; font-weight: 400; font-size: 0.95rem; }
        .footer-linkedin {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #ffffff;
            color: #000000 !important;
            border-radius: 50%;
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        @media(max-width: 768px) {
            .contact-grid { flex-direction: column; gap: 3rem; }
            .contact-left, .contact-right { width: 100%; }
            .logo-container { padding-left: 1rem; }
            .nav-links a { padding: 0 1rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-container">
            <svg class="logo-icon" viewBox="0 0 24 24">
                <path d="M12 2L2 22h20L12 2zm0 4.85L18.4 18H5.6L12 6.85zM11 10v4h2v-4h-2zm0 5v2h2v-2h-2z"/>
            </svg>
            <div class="logo">ToddHo</div>
        </a>
        <div class="nav-links">
            <a href="index.html">Work</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
            <button id="theme-toggle">🌓</button>
        </div>
    </nav>

    <div class="container">
        <div class="contact-grid">
            <div class="contact-left">
                <h1>Let's Connect</h1>
                <p class="contact-desc">Interested in learning more about my work or how we can collaborate on an upcoming project? Reach out today.</p>
                <div class="info-text"><a href="mailto:toddhodesigns@gmail.com">toddhodesigns@gmail.com</a></div>
                <div class="info-text">617.842.2997</div>
                <a href="https://www.linkedin.com/in/toddho/" target="_blank" class="linkedin-icon">in</a>
            </div>

            <div class="contact-right">
                <form action="mailto:toddhodesigns@gmail.com" method="POST" enctype="text/plain">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="Name*" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" placeholder="Email*" required>
                    </div>
                    <div class="form-group">
                        <textarea name="message" rows="6" placeholder="Message*" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Submit</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="base-footer">
        <div class="footer-info">
            <a href="mailto:toddhodesigns@gmail.com">toddhodesigns@gmail.com</a><br>
            617.842.2997
        </div>
        <div>
            <a href="https://www.linkedin.com/in/toddho/" target="_blank" class="footer-linkedin">in</a>
        </div>
        <p style="font-weight: 300;">© 2026 By Todd Ho Nguyen</p>
    </footer>

    <script>
        const toggleButton = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);

        toggleButton.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
